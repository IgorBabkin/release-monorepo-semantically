name: publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for creating releases and tags
  issues: write # Required for creating issue comments
  pull-requests: write # Required for creating PR comments
  packages: write # Required for publishing to GitHub Packages

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run test:e2e

  release:
    name: Publish NPM package
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      # OIDC authentication is automatically used when:
      # 1. permissions.id-token: write is set (see top of file)
      # 2. npm 11.5.1+ is installed (next step)
      # 3. Trusted Publishing is configured in npm account settings
      - name: Ensure npm 11.5.1 or later for OIDC
        run: |
          npm install -g npm@latest
          npm --version

      - run: npm ci

      - run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.hooksPath /dev/null  # Disable git hooks on CI

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx semantic-release
