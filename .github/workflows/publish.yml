name: publish

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for creating releases and tags
  issues: write # Required for creating issue comments
  pull-requests: write # Required for creating PR comments
  packages: write # Required for publishing to GitHub Packages

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run test:e2e

  release:
    name: Publish NPM package
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://www.npmjs.com/package/release-monorepo-semantically
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      # OIDC authentication is automatically used when:
      # 1. permissions.id-token: write is set (see top of file)
      # 2. npm 11.5.1+ is installed (next step)
      # 3. Trusted Publishing is configured in npm account settings
      - name: Ensure npm 11.5.1 or later for OIDC
        run: |
          npm install -g npm@latest
          npm --version

      - run: pnpm install --frozen-lockfile

      - run: pnpm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config core.hooksPath /dev/null  # Disable git hooks on CI

      - name: Debug npm trusted publishing OIDC
        run: |
          echo "repo=$GITHUB_REPOSITORY"
          echo "ref=$GITHUB_REF"
          echo "workflow=$GITHUB_WORKFLOW"
          echo "job=$GITHUB_JOB"
          echo "environment=production"

          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC request env is missing"
            exit 1
          fi

          response_file="$(mktemp)"
          curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm:registry.npmjs.org" \
            -o "$response_file"

          node -e '
            const fs = require("node:fs");
            const response = JSON.parse(fs.readFileSync(process.argv[1], "utf8"));
            const token = response.value;
            if (!token) {
              console.error("OIDC token response did not contain a value field");
              process.exit(1);
            }

            const payload = JSON.parse(Buffer.from(token.split(".")[1], "base64url").toString("utf8"));
            const summary = {
              iss: payload.iss,
              aud: payload.aud,
              sub: payload.sub,
              repository: payload.repository,
              repository_owner: payload.repository_owner,
              ref: payload.ref,
              job_workflow_ref: payload.job_workflow_ref,
              environment: payload.environment,
            };

            console.log(JSON.stringify(summary, null, 2));
          ' "$response_file"

          rm -f "$response_file"

      - name: Release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
